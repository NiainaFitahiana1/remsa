<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Atero - Plateforme livraison</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top right, #ffffff, #f3f4f6, #e5e7eb);
        }
        .bg-logo-red {
            background-color: #E61E25;
        }
        .glass-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 1));
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-md w-full space-y-8 glass-card p-6 sm:p-10 rounded-3xl shadow-2xl border border-white transition-all duration-500">
        
        <div class="flex items-center gap-3 -mb-10 -mt-5 -ms-5">
            <img class="h-16 sm:h-32 w-auto transition-transform duration-300 hover:scale-105" src="logo.png" alt="Tero Logo">
            <!-- <div class="flex items-center gap-3">
                <span class="text-2xl font-light text-gray-300 mt-2">|</span>
                <h1 class="text-lg mt-2 ms-4 font-bold tracking-tight text-gray-800 uppercase">Connexion</h1>
            </div> -->
        </div>

        <div class="relative mb-8">
            <hr class="border-gray-100 w-full">
            <p class="text-sm text-gray-500 mt-4 ml-1">
                Heureux de vous revoir. Connectez-vous à votre espace.
            </p>
        </div>

        <form class="mt-8 space-y-5" action="#" method="POST">
            <div class="space-y-4">
                <div>
                    <label for="email-address" class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1 ml-1">Adresse Email</label>
                    <input id="email-address" name="email" type="email" autocomplete="email" required 
                        class="appearance-none rounded-xl relative block w-full px-4 py-3.5 border border-gray-200 placeholder-gray-400 text-gray-900 focus:outline-none focus:ring-2 focus:ring-red-500/20 focus:border-red-500 transition-all sm:text-sm" 
                        placeholder="nom@exemple.com">
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1 ml-1">
                        <label for="password" class="block text-xs font-semibold text-gray-600 uppercase tracking-wider">Mot de passe</label>
                        <a href="#" class="text-[11px] font-medium text-red-600 hover:text-red-700">Oublié ?</a>
                    </div>
                    <input id="password" name="password" type="password" autocomplete="current-password" required 
                        class="appearance-none rounded-xl relative block w-full px-4 py-3.5 border border-gray-200 placeholder-gray-400 text-gray-900 focus:outline-none focus:ring-2 focus:ring-red-500/20 focus:border-red-500 transition-all sm:text-sm" 
                        placeholder="••••••••">
                </div>
            </div>

            <div class="flex items-center px-1">
                <input id="remember-me" name="remember-me" type="checkbox" 
                    class="h-4 w-4 text-red-600 focus:ring-red-500 border-gray-300 rounded cursor-pointer">
                <label for="remember-me" class="ml-2 block text-sm text-gray-600 cursor-pointer">
                    Rester connecté
                </label>
            </div>

            <button type="submit" 
                class="w-full flex justify-center py-3.5 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-logo-red hover:bg-red-700 focus:outline-none focus:ring-4 focus:ring-red-500/30 transition-all shadow-lg shadow-red-500/20 active:scale-[0.98]">
                Se connecter
            </button>
        </form>

        <div class="text-center pt-2">
            <p class="text-sm text-gray-500">
                Pas encore de compte ? 
                <a href="register.html" class="font-semibold text-gray-800 hover:text-red-600 transition-colors border-b border-gray-800 hover:border-red-600 pb-0.5">
                    Créer un compte
                </a>
            </p>
        </div>
    </div>

    <footer class="mt-8 text-center space-y-2">
        <div class="flex justify-center space-x-4 text-xs text-gray-400">
            <a href="#" class="hover:text-gray-600 transition-colors">Aide</a>
            <a href="#" class="hover:text-gray-600 transition-colors">Confidentialité</a>
            <a href="#" class="hover:text-gray-600 transition-colors">Conditions</a>
        </div>
        <p class="text-[10px] text-gray-400 tracking-widest uppercase">
            &copy; 2026 ATERO LOGISTICS. Tous droits réservés.
        </p>
    </footer>

</body>
</html>
