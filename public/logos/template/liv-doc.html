<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documents Chauffeur | Atero</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top right, #ffffff, #f3f4f6, #e5e7eb);
        }
        .bg-logo-red { background-color: #E61E25; }
        .glass-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 1));
            backdrop-filter: blur(10px);
        }
        .file-drop-area {
            border: 2px dashed #e5e7eb;
            transition: all 0.3s ease;
        }
        .file-drop-area:hover {
            border-color: #E61E25;
            background-color: rgba(230, 30, 37, 0.02);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 py-12">

    <div class="max-w-2xl w-full space-y-8 glass-card p-6 sm:p-10 rounded-3xl shadow-2xl border border-white transition-all duration-500">
        
        <div class="flex items-center gap-3 -mb-10 -mt-5 -ms-5">
            <img class="h-16 sm:h-32 w-auto transition-transform duration-300 hover:scale-105" src="logo.png" alt="Tero Logo">
            <!-- <div class="flex items-center gap-3">
                <span class="text-2xl font-light text-gray-300">|</span>
                <h1 class="text-md mt-1 ms-2 font-bold tracking-tight text-gray-800">Dossier Chauffeur</h1> 
            </div>-->
        </div>

        <div class="relative mb-8">
            <hr class="border-gray-100 w-full">
            <p class="text-sm text-gray-500 mt-4 ml-1">
                Veuillez transmettre vos documents officiels pour validation de votre compte livreur.
            </p>
        </div>

        <form class="mt-8 space-y-6" action="#" method="POST" enctype="multipart/form-data">
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1 ml-1">Type de véhicule</label>
                    <select class="appearance-none rounded-xl block w-full px-4 py-3 border border-gray-200 text-gray-900 focus:outline-none focus:ring-2 focus:ring-red-500/20 focus:border-red-500 transition-all sm:text-sm bg-white">
                        <option>Moto / Scooter</option>
                        <option>Voiture</option>
                        <option>Utilitaire / Camionnette</option>
                        <option>Vélo</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1 ml-1">Numéro d'immatriculation</label>
                    <input type="text" placeholder="Ex: AA-123-BB" class="rounded-xl w-full px-4 py-3 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-red-500/20 focus:border-red-500 sm:text-sm">
                </div>
            </div>

            <div class="space-y-2">
                <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider ml-1">Permis de conduire (Recto/Verso)</label>
                <div class="file-drop-area rounded-2xl p-6 text-center cursor-pointer">
                    <input type="file" class="hidden" id="permis-file" accept="image/*,application/pdf">
                    <label for="permis-file" class="cursor-pointer">
                        <svg class="mx-auto h-8 w-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                        </svg>
                        <p class="mt-2 text-sm text-gray-600 font-medium">Cliquez pour ajouter ou glissez le fichier</p>
                        <p class="text-xs text-gray-400 mt-1">PNG, JPG ou PDF jusqu'à 5MB</p>
                    </label>
                </div>
            </div>

            <div class="space-y-2">
                <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider ml-1">Carte Grise du véhicule</label>
                <div class="file-drop-area rounded-2xl p-6 text-center cursor-pointer">
                    <input type="file" class="hidden" id="cg-file" accept="image/*,application/pdf">
                    <label for="cg-file" class="cursor-pointer">
                        <svg class="mx-auto h-8 w-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        <p class="mt-2 text-sm text-gray-600 font-medium">Téléverser la carte grise</p>
                    </label>
                </div>
            </div>

            <div class="flex gap-3 pt-2">
                <button type="button" class="flex-1 py-3.5 px-4 text-sm font-semibold rounded-xl text-gray-600 bg-gray-100 hover:bg-gray-200 transition-all">
                    Plus tard
                </button>
                <button type="submit" class="flex-[2] py-3.5 px-4 text-sm font-bold rounded-xl text-white bg-logo-red hover:bg-red-700 shadow-lg shadow-red-500/20 active:scale-[0.98] transition-all">
                    Soumettre le dossier
                </button>
            </div>
        </form>
    </div>

    <footer class="mt-8 text-center">
        <p class="text-[10px] text-gray-400 tracking-widest uppercase">
            &copy; 2026 ATERO LOGISTICS • ESPACE LIVREUR
        </p>
    </footer>

</body>
</html>
